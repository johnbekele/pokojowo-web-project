name: CI - Backend API

on:
  pull_request:
    branches: [main]
    paths:
      - "pokojowo-fastapi/**"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/security-scan-python.yml"
  push:
    branches: [main]
    paths:
      - "pokojowo-fastapi/**"
      - ".github/workflows/ci-backend.yml"
      - ".github/workflows/security-scan-python.yml"

concurrency:
  group: ci-backend-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokojowo-fastapi
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pokojowo-fastapi/requirements.txt

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check app scripts main.py

      - name: Ruff format check
        run: ruff format --check app scripts main.py

  syntax-check:
    name: Syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pokojowo-fastapi
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pokojowo-fastapi/requirements.txt

      - name: Compile all Python files
        run: python -m compileall -q app scripts main.py

  security-scan:
    name: Security scan (Bandit)
    uses: ./.github/workflows/security-scan-python.yml
    with:
      app_name: pokojowo-fastapi
      app_path: pokojowo-fastapi
      requirements_path: pokojowo-fastapi/requirements.txt
      python_version: "3.11"
      bandit_severity: high

  dockerfile-lint:
    name: Dockerfile lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Lint backend Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ./pokojowo-fastapi/Dockerfile
          failure-threshold: warning

  build-image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, syntax-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build backend image (no push)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ./pokojowo-fastapi
          file: ./pokojowo-fastapi/Dockerfile
          push: false
          tags: pokojowo-fastapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
