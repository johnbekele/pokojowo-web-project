name: CI - SEC - Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly full-history scan to catch secrets that may have slipped in over time
  schedule:
    - cron: "0 3 * * 1"

concurrency:
  group: secret-scan-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Gitleaks: git-history aware secret scan ──────────────────────────────
  gitleaks:
    name: Gitleaks (git history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(gh api repos/gitleaks/gitleaks/releases/latest --jq '.tag_name' | sed 's/^v//')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        env:
          # On scheduled runs scan the entire history; on PRs/pushes scan only the diff
          LOG_OPTS: >-
            ${{
              github.event_name == 'pull_request'
                && format('{0}...{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha)
                || github.event_name == 'push'
                  && format('{0}^...{1}', github.event.before, github.sha)
                || ''
            }}
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="${LOG_OPTS}" \
            --verbose

  # ── TruffleHog: deep entropy + verified credential scan ──────────────────
  trufflehog:
    name: TruffleHog (entropy + credentials)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: TruffleHog OSS scan
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          base: >-
            ${{
              github.event_name == 'pull_request'
                && github.event.pull_request.base.sha
                || github.event_name == 'push'
                  && github.event.before
                || ''
            }}
          head: ${{ github.sha }}
          extra_args: --only-verified

  # ── .env file guard: block accidental commits of real secrets ───────────
  env-file-guard:
    name: .env file guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check for committed real .env files
        run: |
          # .env, .env.local, .env.*.local files contain real secrets and must
          # never be tracked. Committed .env.example / .env.development /
          # .env.production templates are safe; gitleaks (job 1) scans content.
          FOUND=$(git ls-files | grep -E '(^|/)\.env(\.local|\..+\.local)?$' | grep -vE '\.example$|\.development$|\.production$' || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Real .env files must never be committed:"
            echo "$FOUND" | while read -r f; do echo "  - $f"; done
            exit 1
          fi
          echo "✓ No real .env files tracked in git"

      - name: Check for .env files in Dockerfiles
        run: |
          # Warn if any Dockerfile COPYs a .env file into the image
          FOUND=$(grep -rn --include='Dockerfile*' -E 'COPY\s+.*\.env[^.]' . || true)
          if [ -n "$FOUND" ]; then
            echo "::error::Dockerfile(s) appear to COPY .env files into the image:"
            echo "$FOUND"
            exit 1
          fi
          echo "✓ No .env files copied into Docker images"
